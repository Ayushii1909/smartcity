<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Complaints – SmartCity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">🏙️ Smart<span>City</span></div>
  <nav id="main-nav">
    <a href="index.html">Home</a>
    <a href="report.html">Report Issue</a>
    <a href="track.html">Track Status</a>
    <a href="mycomplaints.html" class="active">My Complaints</a>
    <a href="about.html">About</a>
  </nav>
  <div style="display:flex;align-items:center">
    <div id="nav-user"></div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="page-hero">
  <div style="font-size:42px">📋</div>
  <div>
    <h1>My Complaints</h1>
    <p id="hero-sub">All complaints submitted by you</p>
  </div>
</div>

<section class="section" style="padding-top:36px">
  <!-- Stats row -->
  <div class="stat-cards" style="margin-bottom:28px">
    <div class="stat-card" style="border-top-color:var(--amber)">
      <div class="num" id="s-total">0</div>
      <div class="lbl">Total Submitted</div>
    </div>
    <div class="stat-card" style="border-top-color:var(--amber)">
      <div class="num" id="s-pending">0</div>
      <div class="lbl">Pending</div>
    </div>
    <div class="stat-card" style="border-top-color:var(--blue)">
      <div class="num" id="s-progress">0</div>
      <div class="lbl">In Progress</div>
    </div>
    <div class="stat-card" style="border-top-color:var(--green)">
      <div class="num" id="s-solved">0</div>
      <div class="lbl">Solved</div>
    </div>
  </div>

  <div id="complaints-list"></div>

  <div style="margin-top:24px">
    <button class="btn" onclick="window.location.href='report.html'">+ Report New Issue</button>
  </div>
</section>

<footer>
  <p>© 2026 Bhavnagar Smart City Management System</p>
</footer>

<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = requireLogin();
  if (!user) return;

  document.getElementById('hero-sub').textContent = 'Complaints submitted by ' + user.name;

  const list = Auth.isAdmin(user) ? Complaints.getAll() : Complaints.getByUser(user.id);
  const el = document.getElementById('complaints-list');

  document.getElementById('s-total').textContent = list.length;
  document.getElementById('s-pending').textContent = list.filter(c => c.status === 'Pending').length;
  document.getElementById('s-progress').textContent = list.filter(c => c.status === 'In Progress').length;
  document.getElementById('s-solved').textContent = list.filter(c => c.status === 'Solved').length;

  if (!list.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="eicon">📭</div>
      <h3>No complaints yet</h3>
      <p>You haven't submitted any complaints. Click below to report your first issue.</p>
      <br><button class="btn" onclick="window.location.href='report.html'">Report an Issue</button>
    </div>`;
    return;
  }

  el.innerHTML = list.map(c => `
    <div class="complaint-card" style="cursor:pointer" onclick="window.location.href='track.html?id=${c.id}'">
      <div>
        <div class="complaint-id">${c.id} &nbsp;|&nbsp; 📅 ${formatDate(c.createdAt)}</div>
        <div class="complaint-title">${c.service} – ${c.title}</div>
        <div class="complaint-meta">${c.description.substring(0,90)}${c.description.length>90?'...':''}</div>
        ${c.location ? `<div class="complaint-loc">📍 ${c.location}</div>` : ''}
        ${c.adminNote ? `<div style="font-size:13px;color:var(--blue);margin-top:4px">💬 ${c.adminNote}</div>` : ''}
      </div>
      <div>${statusBadge(c.status)}</div>
    </div>
  `).join('');
});
</script>
</body>
</html>
