<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Complaint – SmartCity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">🏙️ Smart<span>City</span></div>
  <nav id="main-nav">
    <a href="index.html">Home</a>
    <a href="report.html">Report Issue</a>
    <a href="track.html" class="active">Track Status</a>
    <a href="mycomplaints.html">My Complaints</a>
    <a href="about.html">About</a>
  </nav>
  <div style="display:flex;align-items:center">
    <div id="nav-user"></div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</header>

<div class="page-hero">
  <div style="font-size:42px">🔍</div>
  <div>
    <h1>Track Your Complaint</h1>
    <p>Enter your Complaint ID to see its current status</p>
  </div>
</div>

<section class="section" style="padding-top:40px">
  <div style="max-width:540px;margin:0 auto 40px">
    <div style="display:flex;gap:10px">
      <input type="text" id="search-id" placeholder="Enter Complaint ID (e.g. CMP-2026-0001)" style="flex:1;padding:14px 16px;border:2px solid var(--gray);border-radius:var(--radius-sm);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:var(--transition)" onfocus="this.style.borderColor='var(--cyan)'" onblur="this.style.borderColor='var(--gray)'" onkeydown="if(event.key==='Enter')doTrack()">
      <button class="btn" onclick="doTrack()" style="white-space:nowrap">Search 🔍</button>
    </div>
    <p style="font-size:13px;color:var(--text-light);margin-top:8px">Try: CMP-2026-0001, CMP-2026-0002, CMP-2026-0003</p>
  </div>

  <!-- RESULT -->
  <div id="result" style="max-width:700px;margin:0 auto"></div>

  <!-- ALL RECENT (if no search) -->
  <div id="all-section">
    <h3 style="color:var(--navy);margin-bottom:6px">Recent Complaints</h3>
    <p style="color:var(--text-light);font-size:14px;margin-bottom:20px">Latest complaints submitted by citizens</p>
    <div class="filter-bar">
      <select id="filter-service" onchange="renderAll()">
        <option value="">All Services</option>
        <option>Electricity</option><option>Water</option>
        <option>Road</option><option>Garbage</option>
        <option>Traffic</option><option>Emergency</option>
      </select>
      <select id="filter-status" onchange="renderAll()">
        <option value="">All Status</option>
        <option>Pending</option><option>In Progress</option>
        <option>Solved</option><option>Rejected</option>
      </select>
    </div>
    <div id="all-list"></div>
  </div>
</section>

<footer>
  <p>© 2026 Bhavnagar Smart City Management System</p>
</footer>

<script src="app.js"></script>
<script>
function doTrack() {
  const id = document.getElementById('search-id').value.trim().toUpperCase();
  const res = document.getElementById('result');
  const allSection = document.getElementById('all-section');

  if (!id) { toast('Please enter a Complaint ID', 'error'); return; }
  const c = Complaints.getById(id);
  if (!c) {
    res.innerHTML = `<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:12px">❌</div>
      <h3 style="color:var(--navy)">Complaint Not Found</h3>
      <p style="color:var(--text-light)">No complaint found with ID <strong>${id}</strong>.<br>Please check and try again.</p>
    </div>`;
    allSection.style.display = 'none';
    return;
  }

  allSection.style.display = 'none';

  const timeline = [
    { label: 'Submitted', date: c.createdAt, done: true },
    { label: 'Under Review', date: c.status !== 'Pending' ? c.updatedAt : null, done: c.status !== 'Pending' },
    { label: 'In Progress', date: c.status === 'In Progress' || c.status === 'Solved' ? c.updatedAt : null, done: c.status === 'In Progress' || c.status === 'Solved' },
    { label: 'Resolved', date: c.status === 'Solved' ? c.updatedAt : null, done: c.status === 'Solved' },
  ];

  res.innerHTML = `
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div>
          <div style="font-size:13px;color:var(--text-light);margin-bottom:4px">${c.id}</div>
          <h3 style="font-size:20px;color:var(--navy)">${c.service} – ${c.title}</h3>
        </div>
        ${statusBadge(c.status)}
      </div>
      <p style="color:var(--text);font-size:14px;margin-bottom:14px">${c.description}</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;font-size:13px;color:var(--text-light);margin-bottom:16px">
        <div>👤 <strong>${c.userName}</strong></div>
        <div>📞 ${c.userPhone || '–'}</div>
        <div>📅 Submitted: ${formatDate(c.createdAt)}</div>
        <div>🔄 Updated: ${formatDate(c.updatedAt)}</div>
        ${c.location ? `<div class="complaint-loc" style="grid-column:1/-1">📍 ${c.location}</div>` : ''}
      </div>
      ${c.adminNote ? `<div style="background:#f0f8ff;border-left:3px solid var(--cyan);padding:12px 16px;border-radius:6px;font-size:14px;margin-bottom:16px"><strong>Official Note:</strong> ${c.adminNote}</div>` : ''}

      <!-- Timeline -->
      <div style="display:flex;gap:0;margin-top:10px">
        ${timeline.map((t, i) => `
          <div style="flex:1;text-align:center;position:relative">
            ${i < timeline.length-1 ? `<div style="position:absolute;top:14px;left:50%;right:-50%;height:3px;background:${t.done ? 'var(--cyan)' : 'var(--gray)'}"></div>` : ''}
            <div style="width:28px;height:28px;border-radius:50%;background:${t.done ? 'var(--cyan)' : 'var(--gray)'};margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1">${t.done ? '✓' : ''}</div>
            <div style="font-size:12px;font-weight:600;color:${t.done ? 'var(--navy)' : 'var(--gray-mid)'}">${t.label}</div>
            ${t.date ? `<div style="font-size:11px;color:var(--text-light)">${new Date(t.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>

    ${c.lat && c.lng ? `
    <div class="card" style="margin-bottom:20px">
      <h3 style="font-size:16px;color:var(--navy);margin-bottom:12px">📍 Complaint Location</h3>
      <div class="location-box">
        <span class="loc-icon">📍</span>
        <div class="loc-text"><strong>${c.location}</strong><small>${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}</small></div>
      </div>
      <div id="track-map" style="margin-top:10px"></div>
    </div>` : ''}

    <button class="btn-navy" style="width:auto;padding:11px 24px" onclick="location.reload()">← Search Another</button>
  `;

  if (c.lat && c.lng) initMap('track-map', c.lat, c.lng, c.location);
}

function renderAll() {
  const svc = document.getElementById('filter-service').value;
  const status = document.getElementById('filter-status').value;
  let list = Complaints.getAll();
  if (svc) list = list.filter(c => c.service === svc);
  if (status) list = list.filter(c => c.status === status);
  const el = document.getElementById('all-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="eicon">📋</div><p>No complaints found.</p></div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="complaint-card" style="cursor:pointer" onclick="document.getElementById('search-id').value='${c.id}';doTrack()">
      <div>
        <div class="complaint-id">${c.id}</div>
        <div class="complaint-title">${c.service} – ${c.title}</div>
        <div class="complaint-meta">📅 ${formatDate(c.createdAt)} &nbsp;|&nbsp; 👤 ${c.userName}</div>
        ${c.location ? `<div class="complaint-loc">📍 ${c.location}</div>` : ''}
      </div>
      <div>${statusBadge(c.status)}</div>
    </div>
  `).join('');
}

document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) { document.getElementById('search-id').value = id; doTrack(); }
});
</script>
</body>
</html>
